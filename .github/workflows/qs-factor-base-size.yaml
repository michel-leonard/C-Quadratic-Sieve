name: Varying factor base size

on:
  schedule:
    - cron: "22 10 * * 1"
  workflow_dispatch:

jobs:
  factor-base-size:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Clone the repository
        uses: actions/checkout@v4

      - name: 🔧 Install GCC
        run: which gcc || sudo apt-get update && sudo apt-get install -y gcc

      - name: ⚙️ Compile the program
        run: gcc -Wall -pedantic -O2 -std=c99 main.c -o factor

      - name: 📜 Generate the file demand.txt
        run: ./factor --demand 220 --rand-seed 0

      - name: 🔍 Run initial factorization to determine base size
        run: |
          ./factor -i demand.txt --verbose 4 2>&1 | tee output-normal.log
          BASE_SIZE=$(grep -oP 'The factor base of \K\d+' output-normal.log)
          echo "Base size: $BASE_SIZE"
          echo "BASE_SIZE=$BASE_SIZE" >> $GITHUB_ENV

      - name: 🔍 Run factorization with 10% smaller base size
        run: |
          SMALL_BASE=$(echo "scale=0; $BASE_SIZE * 0.9 / 1" | bc)
          echo "Using smaller base size: $SMALL_BASE"
          ./factor -i demand.txt --verbose 4 --qs-base-size $SMALL_BASE 2>&1 | tee output-small.log

      - name: 🔍 Run factorization with 10% larger base size
        run: |
          LARGE_BASE=$(echo "scale=0; $BASE_SIZE * 1.1 / 1" | bc)
          echo "Using larger base size: $LARGE_BASE"
          ./factor -i demand.txt --verbose 4 --qs-base-size $LARGE_BASE 2>&1 | tee output-large.log

      - name: 📊 Compare execution times
        run: |
          echo "Normal factor base ($BASE_SIZE): "$(tail -n 1 output-normal.log)
          echo "Small base ($SMALL_BASE) : "$(tail -n 1 output-small.log)
          echo "Large factor base ($LARGE_BASE) : "$(tail -n 1 output-large.log)
