name: Factorization with varying base size

on:
  schedule:
    - cron: "22 10 * * 1"
  workflow_dispatch:

jobs:
  factorization-different-base-size:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Clone the repository
        uses: actions/checkout@v4

      - name: 🔧 Install GCC
        run: which gcc || sudo apt-get update && sudo apt-get install -y gcc

      - name: ⚙️ Compile the program
        run: gcc -Wall -pedantic -O3 -std=c99 main.c -o factor

      - name: 📜 Generate the file demand.txt
        run: ./factor --demand 220 --rand-seed 0

      - name: 🔍 Run initial factorization to determine base size
        run: |
          ./factor -i demand.txt --verbose 4 2> base-size.log
          BASE_SIZE=$(grep -oP 'The factor base of \K\d+' base-size.log)
          echo "Base size: $BASE_SIZE"
          echo "BASE_SIZE=$BASE_SIZE" >> $GITHUB_ENV

      - name: 🔍 Run factorization with 10% smaller base size
        run: |
          SMALL_BASE=$(echo "scale=0; $BASE_SIZE * 0.9 / 1" | bc)
          echo "Using smaller base size: $SMALL_BASE"
          /usr/bin/time -f "%e" ./factor -i demand.txt --qs-base-size $SMALL_BASE > output_small.log 2>&1

      - name: 🔍 Run factorization with 10% larger base size
        run: |
          LARGE_BASE=$(echo "scale=0; $BASE_SIZE * 1.1 / 1" | bc)
          echo "Using larger base size: $LARGE_BASE"
          /usr/bin/time -f "%e" ./factor -i demand.txt --qs-base-size $LARGE_BASE > output_large.log 2>&1

      - name: 📊 Compare execution times
        run: |
          SMALL_TIME=$(grep -oE '[0-9]+\.[0-9]+' output_small.log | tail -1)
          LARGE_TIME=$(grep -oE '[0-9]+\.[0-9]+' output_large.log | tail -1)
          echo "Execution time with smaller base: $SMALL_TIME seconds"
          echo "Execution time with larger base: $LARGE_TIME seconds"
