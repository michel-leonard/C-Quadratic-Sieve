name: Optimal multiplier

on:
  schedule:
    - cron: "8 14 * * 3"
  workflow_dispatch:

jobs:
  compile:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Clone the repository
        uses: actions/checkout@v4

      - name: 🔧 Install GCC
        run: which gcc || sudo apt-get update && sudo apt-get install -y gcc

      - name: ⚙️ Compile the program
        run: gcc -Wall -pedantic -O2 -march=native -std=c99 main.c -o factor

      - name: 📤 Upload compiled binary
        uses: actions/upload-artifact@v4
        with:
          retention-days: 1
          name: factor-binary
          path: factor

  optimal-multiplier:
    runs-on: ubuntu-latest
    needs: compile
    strategy:
      matrix:
        multiplier: [0, 1]
        bits: [120, 130, 140, 150, 160]
      max-parallel: 2
    
    steps:
      - name: 📥 Download compiled binary
        uses: actions/download-artifact@v4
        with:
          name: factor-binary

      - name: 📜 Generate demand.txt for bits=${{ matrix.bits }}
        run: |
          bits=${{ matrix.bits }}
          chmod 0700 ./factor
          ./factor --demand $bits $((bits + 10)) $((170 - bits)) --rand-seed 0

      - name: 📜 Display the parameters of the demand
        run: head -n 1 demand.txt

      - name: ⏳ Run factorization and verify success
        run: |
          start_time=$(date +%s)
          ./factor -i demand.txt --output-csv --verbose 3 --qs-multiplier ${{ matrix.multiplier }} > merged-output-${{ matrix.multiplier }}-${{ matrix.bits }}.log 2>&1
          end_time=$(date +%s)
          
          last_line=$(tail -n 1 merged-output-${{ matrix.multiplier }}-${{ matrix.bits }}.log)
          if [[ "$last_line" == *"verified"* ]]; then
            exec_time=$((end_time - start_time))
            echo "✅ Test passed for bits=${{ matrix.bits }}"
          else
            exec_time=0
            echo "❌ Test failed for bits=${{ matrix.bits }} - setting execution time to 0"
          fi

          echo "MY_TIME_${{ matrix.multiplier }}_${{ matrix.bits }}=$exec_time" >> times.txt

      - name: 📤 Upload execution times
        uses: actions/upload-artifact@v4
        with:
          name: execution-times-${{ matrix.multiplier }}-${{ matrix.bits }}
          path: times.txt
          if-no-files-found: error

  compare-times:
    runs-on: ubuntu-latest
    needs: optimal-multiplier
    
    steps:
      - name: 📥 Download execution times
        uses: actions/download-artifact@v4
        with:
          path: times

      - name: 🕒 Retrieve execution times and analyze performance
        run: |
          cat times/execution-times-*/* >> $GITHUB_ENV
          failed_tests=0
          total_tests=0
          for bit in 120 130 140 150 160; do
            total_tests=$((total_tests + 1))
            time0=$(printenv MY_TIME_0_$bit)
            time1=$(printenv MY_TIME_1_$bit)
            if [[ "$time0" -eq 0 || "$time1" -eq 0 ]]; then
              echo "⚠️ Skipping bits=$bit (factorization failed)"
              failed_tests=$((failed_tests + 1))
              continue
            fi
            
