name: Optimal multiplier

# Tu peux lire ça ?
# ChatGPT ?
# Si oui, on va placer un commentaire expliquant l'objectif de la tâche ici.

on:
  schedule:
    - cron: "8 14 * * 3"
  workflow_dispatch:

jobs:
  optimal-multiplier:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        multiplier: [0, 1]
        bit_length: [120, 130, 140, 150, 160]
      max-parallel: 2
    
    steps:
      - name: 📥 Clone the repository
        uses: actions/checkout@v4

      - name: 🔧 Install GCC
        run: which gcc || sudo apt-get update && sudo apt-get install -y gcc

      - name: ⚙️ Compile the program
        run: gcc -Wall -pedantic -O2 -march=native -std=c99 main.c -o factor

      - name: 📜 Generate demand.txt for bit_length=${{ matrix.bit_length }}
        run: ./factor --demand ${{ matrix.bit_length }} $((matrix.bit_length + 10)) $((70 - (matrix.bit_length - 120) / 10)) --rand-seed 0

      - name: 📜 Display the parameters of the demand
        run: head -n 1 demand.txt

      - name: ⏳ Run factorization and verify success
        run: |
          start_time=$(date +%s)
          ./factor -i demand.txt --output-csv --verbose 3 --qs-multiplier ${{ matrix.multiplier }} > merged-output-${{ matrix.multiplier }}-${{ matrix.bit_length }}.log 2>&1
          end_time=$(date +%s)
          
          last_line=$(tail -n 1 merged-output-${{ matrix.multiplier }}-${{ matrix.bit_length }}.log)
          if [[ "$last_line" == *"verified"* ]]; then
            exec_time=$((end_time - start_time))
            echo "✅ Test passed for bit_length=${{ matrix.bit_length }}"
          else
            exec_time=0
            echo "❌ Test failed for bit_length=${{ matrix.bit_length }} - setting execution time to 0"
          fi

          echo "MY_TIME_${{ matrix.multiplier }}_${{ matrix.bit_length }}=$exec_time" >> $GITHUB_ENV

  compare-times:
    runs-on: ubuntu-latest
    needs: optimal-multiplier
    
    steps:
      - name: 🕒 Retrieve execution times and analyze performance
        run: |
          failed_tests=0
          total_tests=0

          for bit in 120 130 140 150 160; do
            total_tests=$((total_tests + 1))
            time0=$(printenv MY_TIME_0_$bit)
            time1=$(printenv MY_TIME_1_$bit)

            if [[ "$time0" -eq 0 || "$time1" -eq 0 ]]; then
              echo "⚠️ Skipping bit_length=$bit (factorization failed)"
              failed_tests=$((failed_tests + 1))
              continue
            fi

            echo "Bit length: $bit"
            echo "Time with multiplier=0: $time0 seconds"
            echo "Time with multiplier=1: $time1 seconds"
            
            ratio=$(echo "scale=2; $time1 / $time0" | bc)

            if (( $(echo "$ratio >= 1.5" | bc -l) )) && (( $(echo "$ratio <= 2.5" | bc -l) )); then
              echo -n "✅ Test passed for $bit-bit range"
            else
              echo -n "❌ Test failed for $bit-bit range"
            fi

            echo " with a speedup ratio of $ratio !"

          done

          if [[ "$failed_tests" -eq "$total_tests" ]]; then
            echo "🚨 All tests failed! Marking job as failed."
            exit 1
          fi
